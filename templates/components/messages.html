{% if messages %}
<div id="hf-messages" style="position:fixed; top:1rem; right:1rem; z-index:9999; display:flex; flex-direction:column; gap:.6rem; max-width:380px; width:calc(100vw - 2rem);">
    {% for message in messages %}
        <div class="alert auto-dismiss
            {% if message.tags == 'error' %}alert-error
            {% elif message.tags == 'success' %}alert-success
            {% elif message.tags == 'warning' %}alert-warning
            {% else %}alert-info{% endif %}"
             style="animation: hfSlideIn .3s ease; box-shadow: 0 4px 20px rgba(27,67,50,0.15);">

            <!-- Icon -->
            <div style="flex-shrink:0; width:18px; height:18px;">
                {% if message.tags == 'success' %}
                    <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 9l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                {% elif message.tags == 'error' %}
                    <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.4"/><path d="M9 5.5V10M9 12.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                {% elif message.tags == 'warning' %}
                    <svg viewBox="0 0 18 18" fill="none"><path d="M9 2L16.5 15H1.5L9 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M9 7v3.5M9 12.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                {% else %}
                    <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.4"/><path d="M9 8.5V13M9 5.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                {% endif %}
            </div>

            <span style="flex:1; font-size:.875rem; line-height:1.4;">{{ message }}</span>

            <button onclick="this.closest('.alert').remove()"
                    style="flex-shrink:0; background:none; border:none; cursor:pointer; opacity:.5; padding:0; line-height:1;"
                    onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.5'">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
    {% endfor %}
</div>

<style>
@keyframes hfSlideIn {
    from { transform: translateX(110%); opacity: 0; }
    to   { transform: translateX(0);   opacity: 1; }
}
</style>
{% endif %}
