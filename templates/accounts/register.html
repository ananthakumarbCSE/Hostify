{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}

<h1>Create Account</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>

<p>Already have an account? <a href="{% url 'accounts:login' %}">Login</a></p>

{% endblock %}
